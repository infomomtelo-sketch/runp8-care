<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RunP8 Care</title>

<style>
* { box-sizing: border-box; }

:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#dbe4ee;

  --blue:#2563eb;
  --green:#15803d;
  --amber:#b45309;
  --red:#b91c1c;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.shell{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* HEADER */
h1{
  margin:0 0 6px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:16px;
}

/* ALERT BAR */
.alert-bar{
  display:grid;
  gap:8px;
  margin-bottom:16px;
}

.alert-item{
  padding:12px;
  border-radius:12px;
  font-weight:600;
  border:1px solid var(--line);
}

.alert-item.danger{
  background:#fef2f2;
  color:#991b1b;
}

.alert-item.warning{
  background:#fffbeb;
  color:#92400e;
}

.alert-item.info{
  background:#eff6ff;
  color:#1d4ed8;
}

/* CHAT */
.chat{
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--line);
  padding:16px;
}

.bubble{
  margin-bottom:12px;
}

.label{
  font-size:12px;
  font-weight:700;
  color:var(--muted);
}

.content{
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  margin-top:6px;
}

/* INPUT */
.input-box{
  margin-top:14px;
  border:2px solid #cbd5e1;
  border-radius:16px;
  padding:14px;
}

input{
  width:100%;
  border:none;
  outline:none;
  font-size:16px;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{
  background:var(--blue);
  color:white;
}

.secondary{
  background:#eef2f7;
}

/* CABINET */
.cabinet{
  margin-top:20px;
  border:1px solid var(--line);
  border-radius:16px;
}

.cabinet-header{
  padding:12px;
  cursor:pointer;
  background:#fff;
}

.cabinet-body{
  display:none;
  padding:12px;
  background:#f9fbff;
}

.cabinet-body.open{
  display:block;
}

/* WORKFLOW */
.workflow{
  display:none;
  margin-top:14px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#f8fbff;
}

.choice{
  margin-top:8px;
}

.choice button{
  margin:4px;
}
</style>
</head>

<body>

<div class="shell">

<h1>RunP8 Care</h1>
<div class="subtitle">Simple outside. Powerful inside.</div>

<!-- ALERT BAR -->
<div id="alertBar" class="alert-bar"></div>

<!-- CHAT -->
<div class="chat">

<div class="bubble">
<div class="label">What you said</div>
<div id="transcript" class="content">Waiting...</div>
</div>

<div class="bubble">
<div class="label">P8 Guidance</div>
<div id="response" class="content">
P8 helps caregivers stay organized and not miss important care tasks.
</div>
</div>

<!-- WORKFLOW -->
<div id="workflow" class="workflow"></div>

<!-- INPUT -->
<div class="input-box">
<input id="input" placeholder='Type or speak: "Mrs Smith had bowel movement"' />
</div>

<div class="actions">
<button class="primary" onclick="send()">Send</button>
<button class="secondary" onclick="speak()">🎤 Speak</button>
<button class="secondary" onclick="scan()">📷 Scan</button>
<button class="secondary" onclick="toggleCabinet()">🗂 Cabinet</button>
</div>

</div>

<!-- CABINET -->
<div class="cabinet">
<div class="cabinet-header" onclick="toggleCabinet()">P8 Cabinet</div>
<div id="cabinetBody" class="cabinet-body">
<div id="cabinetContent">System details hidden until needed</div>
</div>
</div>

</div>

<script>

/* ALERTS */
const alerts = [
  {type:"danger", text:"Mrs Smith missed PM medication"},
  {type:"warning", text:"Refill needed: 10 pills left"},
  {type:"info", text:"Rash cream scheduled tonight"}
];

function renderAlerts(){
  const bar = document.getElementById("alertBar");
  bar.innerHTML = alerts.map(a =>
    `<div class="alert-item ${a.type}">${a.text}</div>`
  ).join("");
}

renderAlerts();

/* INPUT */
function send(){
  const text = document.getElementById("input").value;
  process(text);
}

/* SPEECH */
function speak(){
  alert("Voice simulation for now");
}

/* SCAN */
function scan(){
  document.getElementById("response").textContent =
  "Scan received. P8 will extract relevant data only.";
}

/* CABINET */
function toggleCabinet(){
  const el = document.getElementById("cabinetBody");
  el.classList.toggle("open");
}

/* WORKFLOW */
function process(text){
  document.getElementById("transcript").textContent = text;

  const lower = text.toLowerCase();

  if(lower.includes("bowel")){
    showBowel();
  }
  else if(lower.includes("med")){
    showMed();
  }
  else{
    document.getElementById("response").textContent =
    "P8 understands. Workflow will open only if needed.";
  }
}

function showBowel(){
  const wf = document.getElementById("workflow");
  wf.style.display = "block";

  wf.innerHTML = `
  <b>Bowel Workflow</b><br/>
  Size:<br/>
  <div class="choice">
    <button onclick="select('Small')">Small</button>
    <button onclick="select('Medium')">Medium</button>
    <button onclick="select('Large')">Large</button>
  </div>
  `;
}

function showMed(){
  const wf = document.getElementById("workflow");
  wf.style.display = "block";

  wf.innerHTML = `
  <b>Medication Workflow</b><br/>
  Status:<br/>
  <div class="choice">
    <button onclick="select('Given')">Given</button>
    <button onclick="select('Missed')">Missed</button>
  </div>
  `;
}

function select(value){
  document.getElementById("response").textContent =
  "Selected: " + value + ". Confirm & Save next.";
}

</script>

</body>
</html>
