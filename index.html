<script>
  const drawer = document.getElementById('drawer');
  const drawerBackdrop = document.getElementById('drawerBackdrop');
  const openDrawerBtn = document.getElementById('openDrawerBtn');
  const closeDrawerBtn = document.getElementById('closeDrawerBtn');

  function openDrawer() {
    drawer.classList.add('open');
    drawerBackdrop.classList.add('open');
    document.body.classList.add('drawer-open');
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    drawerBackdrop.classList.remove('open');
    document.body.classList.remove('drawer-open');
  }

  openDrawerBtn.addEventListener('click', openDrawer);
  closeDrawerBtn.addEventListener('click', closeDrawer);
  drawerBackdrop.addEventListener('click', closeDrawer);

  const tabChat = document.getElementById('tabChat');
  const tabRecords = document.getElementById('tabRecords');
  const viewChat = document.getElementById('viewChat');
  const viewRecords = document.getElementById('viewRecords');

  function setTab(tabName) {
    const isChat = tabName === 'chat';

    tabChat.classList.toggle('active', isChat);
    tabRecords.classList.toggle('active', !isChat);

    tabChat.setAttribute('aria-selected', isChat ? 'true' : 'false');
    tabRecords.setAttribute('aria-selected', !isChat ? 'true' : 'false');

    viewChat.classList.toggle('active', isChat);
    viewRecords.classList.toggle('active', !isChat);
  }

  tabChat.addEventListener('click', () => setTab('chat'));
  tabRecords.addEventListener('click', () => setTab('records'));

  const transcriptEl = document.getElementById('transcript');
  const responseEl = document.getElementById('response');
  const manualInput = document.getElementById('manualInput');
  const scanBtn = document.getElementById('scanBtn');
  const fileInput = document.getElementById('fileInput');
  const listenBtn = document.getElementById('listenBtn');
  const speakBtn = document.getElementById('speakBtn');

  let state = '';
  let record = {};
  let preferredLanguage = 'multi-lingual';

  function normalizeText(text) {
    return text.trim();
  }

  function setTranscript(text) {
    transcriptEl.textContent = text;
  }

  function setResponse(text) {
    responseEl.textContent = text;
  }

  function clearSession() {
    state = '';
    record = {};
  }

  function lower(text) {
    return text.toLowerCase();
  }

  function startMedicationFlow(residentName = 'Mrs. Smith') {
    record = {
      resident: residentName,
      language: preferredLanguage,
      medication: '',
      administeredBy: '',
      witnessConfirmed: '',
      bowelMovement: '',
      bowelSize: '',
      bowelConsistency: '',
      time: ''
    };

    state = 'medication_name';

    setResponse(
`Medication workflow started.

Resident: ${record.resident}

Please enter the medication name and dose.
Example:
Metformin 500 mg`
    );
  }

  function startBowelFlow(residentName = 'Mrs. Smith') {
    record = {
      resident: residentName,
      language: preferredLanguage,
      medication: '',
      administeredBy: '',
      witnessConfirmed: '',
      bowelMovement: 'Yes',
      bowelSize: '',
      bowelConsistency: '',
      time: ''
    };

    state = 'bowel_size';

    setResponse(
`Bowel workflow started.

Resident: ${record.resident}

What is the bowel movement size?
small / medium / large`
    );
  }

  function startDailyNoteFlow(residentName = 'Mrs. Smith') {
    record = {
      resident: residentName,
      language: preferredLanguage,
      dailyNote: '',
      time: ''
    };

    state = 'daily_note';

    setResponse(
`Daily note started.

Resident: ${record.resident}

Enter the shift note. P8 will save it as a clean English care note.`
    );
  }

  function detectResidentFromText(text) {
    const t = lower(text);

    if (t.includes('mrs. smith') || t.includes('mrs smith')) return 'Mrs. Smith';
    if (t.includes('john lawson')) return 'John Lawson';

    return 'Mrs. Smith';
  }

  function saveMedicationRecord() {
    record.time = new Date().toLocaleTimeString();

    const notesBox = Array.from(document.querySelectorAll('.record-box')).find(box => {
      const title = box.querySelector('h4');
      return title && title.textContent.trim().toLowerCase() === 'notes';
    });

    if (notesBox) {
      const recordList = notesBox.querySelector('.record-list');
      if (recordList) {
        const item = document.createElement('div');
        item.className = 'record-item';
        item.innerHTML = `
          <strong>${record.resident}</strong>
          <span>
            Medication: ${record.medication}. Administered by: ${record.administeredBy}. Witness confirmed: ${record.witnessConfirmed}. Bowel movement: ${record.bowelMovement}${record.bowelMovement === 'Yes' ? ` (${record.bowelSize}, ${record.bowelConsistency})` : ''}. Time: ${record.time}
          </span>
        `;
        recordList.prepend(item);
      }
    }

    setResponse(
`Record saved in English.

Resident: ${record.resident}
Medication: ${record.medication}
Administered by: ${record.administeredBy}
Witness confirmed: ${record.witnessConfirmed}
Bowel movement: ${record.bowelMovement}
Size: ${record.bowelSize || '-'}
Consistency: ${record.bowelConsistency || '-'}
Time: ${record.time}`
    );

    setTab('records');
    clearSession();
  }

  function saveDailyNoteRecord() {
    record.time = new Date().toLocaleTimeString();

    const notesBox = Array.from(document.querySelectorAll('.record-box')).find(box => {
      const title = box.querySelector('h4');
      return title && title.textContent.trim().toLowerCase() === 'notes';
    });

    if (notesBox) {
      const recordList = notesBox.querySelector('.record-list');
      if (recordList) {
        const item = document.createElement('div');
        item.className = 'record-item';
        item.innerHTML = `
          <strong>${record.resident}</strong>
          <span>Daily note: ${record.dailyNote}. Time: ${record.time}</span>
        `;
        recordList.prepend(item);
      }
    }

    setResponse(
`Daily note saved in English.

Resident: ${record.resident}
Note: ${record.dailyNote}
Time: ${record.time}`
    );

    setTab('records');
    clearSession();
  }

  function processStateInput(text) {
    if (state === 'medication_name') {
      record.medication = text;
      state = 'med_admin';
      setResponse(
`Medication captured.

Who administered the medication?`
      );
      return true;
    }

    if (state === 'med_admin') {
      record.administeredBy = text;
      state = 'med_confirm';
      setResponse(
`Please confirm policy requirement.

Confirm that ${record.medication} was administered by ${record.administeredBy}.
Type: yes`
      );
      return true;
    }

    if (state === 'med_confirm') {
      if (lower(text) !== 'yes') {
        setResponse(
`Confirmation is required before saving medication records.

Type: yes`
        );
        return true;
      }

      record.witnessConfirmed = 'Yes';
      state = 'bowel_yes_no';
      setResponse(
`Did the resident have a bowel movement?

Type:
yes
or
no`
      );
      return true;
    }

    if (state === 'bowel_yes_no') {
      const t = lower(text);

      if (t === 'yes') {
        record.bowelMovement = 'Yes';
        state = 'bowel_size';
        setResponse(
`What is the bowel movement size?

small / medium / large`
        );
        return true;
      }

      if (t === 'no') {
        record.bowelMovement = 'No';
        saveMedicationRecord();
        return true;
      }

      setResponse(`Please answer yes or no.`);
      return true;
    }

    if (state === 'bowel_size') {
      record.bowelSize = text;
      state = 'bowel_consistency';
      setResponse(
`What is the bowel movement consistency?

soft / hard / loose / normal`
      );
      return true;
    }

    if (state === 'bowel_consistency') {
      record.bowelConsistency = text;

      if (record.medication) {
        saveMedicationRecord();
      } else {
        record.time = new Date().toLocaleTimeString();

        const notesBox = Array.from(document.querySelectorAll('.record-box')).find(box => {
          const title = box.querySelector('h4');
          return title && title.textContent.trim().toLowerCase() === 'notes';
        });

        if (notesBox) {
          const recordList = notesBox.querySelector('.record-list');
          if (recordList) {
            const item = document.createElement('div');
            item.className = 'record-item';
            item.innerHTML = `
              <strong>${record.resident}</strong>
              <span>Bowel movement recorded: ${record.bowelSize}, ${record.bowelConsistency}. Time: ${record.time}</span>
            `;
            recordList.prepend(item);
          }
        }

        setResponse(
`Bowel record saved in English.

Resident: ${record.resident}
Bowel movement: Yes
Size: ${record.bowelSize}
Consistency: ${record.bowelConsistency}
Time: ${record.time}`
        );

        setTab('records');
        clearSession();
      }

      return true;
    }

    if (state === 'daily_note') {
      record.dailyNote = text;
      saveDailyNoteRecord();
      return true;
    }

    return false;
  }

  function processInput(text) {
    const clean = normalizeText(text);
    if (!clean) return;

    setTranscript(clean);

    if (processStateInput(clean)) return;

    const l = lower(clean);
    const residentName = detectResidentFromText(clean);

    if (
      l.includes('medication') ||
      l.includes('med') ||
      l.includes('prn') ||
      l.includes('tylenol') ||
      l.includes('pill')
    ) {
      startMedicationFlow(residentName);
      return;
    }

    if (l.includes('bowel')) {
      startBowelFlow(residentName);
      return;
    }

    if (l.includes('daily note') || l.includes('narrative')) {
      startDailyNoteFlow(residentName);
      return;
    }

    if (
      l.includes('upset') ||
      l.includes('agitated') ||
      l.includes('not responding')
    ) {
      setResponse(
`Calm Assist recognized.

Immediate guidance:
• pause before repeating
• use one short sentence
• keep tone calm
• reassure instead of arguing
• document what changed after the resident settles`
      );
      return;
    }

    if (
      l.includes('english') ||
      l.includes('spanish') ||
      l.includes('tagalog') ||
      l.includes('multi lingual') ||
      l.includes('multilingual')
    ) {
      preferredLanguage = 'multi-lingual';
      setResponse(
`Language mode is set for multilingual workflow.

Supported:
• English
• Spanish
• Tagalog

Structured records will still be saved in English.`
      );
      return;
    }

    setResponse(
`P8 understands the request, but no structured workflow was matched yet.

Try:
• Log medication for Mrs. Smith
• Mrs. Smith had a bowel movement
• Start daily note for Mrs. Smith`
    );
  }

  manualInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      processInput(manualInput.value);
      manualInput.value = '';
    }
  });

  document.querySelectorAll('.helper-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      processInput(btn.dataset.example);
    });
  });

  scanBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    setTranscript('Captured file selected.');
    setResponse(
`Capture / scan received.

P8 should use this as structured care context only.
Examples:
• medication label
• doctor report
• previous facility record
• family note`
    );
  });

  function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.92;
    utterance.pitch = 1;
    utterance.volume = 1;
    window.speechSynthesis.speak(utterance);
  }

  listenBtn.addEventListener('click', () => {
    speakText(responseEl.textContent);
  });

  let recognition = null;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      speakBtn.textContent = '◼';
    };

    recognition.onend = () => {
      speakBtn.textContent = '🎤';
    };

    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      processInput(text);
    };

    recognition.onerror = () => {
      setResponse('Voice input had an error. You can still type or use scan.');
    };

    speakBtn.addEventListener('click', () => {
      recognition.start();
    });
  } else {
    speakBtn.addEventListener('click', () => {
      setResponse('Voice recognition is not supported in this browser. You can still type or scan.');
    });
  }

  document.querySelectorAll('.drawer-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('.drawer-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');

      const section = link.dataset.nav;

      if (section === 'records' || section === 'sources') {
        setTab('records');
      } else {
        setTab('chat');
        setResponse(`Opened ${section} from navigation.`);
      }

      closeDrawer();
    });
  });
</script>
